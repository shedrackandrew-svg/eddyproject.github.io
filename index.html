<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eddy Project</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --text: #1e1f22;
      --accent: #0c7c59;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: radial-gradient(circle at top right, #fff8e8 0%, var(--bg) 60%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      max-width: 720px;
      width: 100%;
      background: var(--card);
      border: 1px solid #e2ddcf;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 12px 30px rgba(30, 31, 34, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      font-size: 1.125rem;
      line-height: 1.6;
    }

    strong {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Eddy Project</h1>
    <p>This project is now published on GitHub Pages and can stay online permanently as long as this repository remains active.</p>
    <p><strong>Last updated:</strong> April 15, 2026</p>
  </main>
</body>
</html>
